name: 每日港股分析

on:
  schedule:
    - cron: '10 10 * * 1-5'  # 周一到周五，UTC 10:10 = 北京时间 18:10（比A股晚10分钟）
  workflow_dispatch:
    inputs:
      mode:
        description: '运行模式'
        required: true
        default: 'stocks-only'
        type: choice
        options:
          - full
          - market-only
          - stocks-only
      force_run:
        description: '强制运行（跳过交易日检查）'
        required: false
        default: false
        type: boolean

concurrency:
  group: hk-stock-analysis
  cancel-in-progress: false

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: 随机延迟（避免固定时间访问）
        run: sleep $((RANDOM % 60))

      - name: 检出代码
        uses: actions/checkout@v5

      - name: 设置 Python 环境
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 安装依赖
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: 创建必要目录
        run: |
          mkdir -p data logs reports

      - name: 执行港股分析
        env:
          # LiteLLM统一配置（v3.4.0破坏性变更）
          LITELLM_MODEL: ${{ vars.LITELLM_MODEL || secrets.LITELLM_MODEL || 'gemini/gemini-3-flash-preview' }}
          LITELLM_CONFIG: ${{ secrets.LITELLM_CONFIG || '' }}
          LLM_CHANNELS: ${{ secrets.LLM_CHANNELS || '' }}
          
          # 向后兼容的单Key配置
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: 'gemini/gemini-3-flash-preview'  # 固定使用LiteLLM格式
          GEMINI_MODEL_FALLBACK: 'gemini/gemini-2.5-flash'  # 固定使用LiteLLM格式
          GEMINI_REQUEST_DELAY: '3.0'
          
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ vars.OPENAI_BASE_URL || secrets.OPENAI_BASE_URL }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || secrets.OPENAI_MODEL || 'gpt-4o-mini' }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # TUSHARE_TOKEN已移除，避免港股数据获取失败
          BOCHA_API_KEYS: ${{ secrets.BOCHA_API_KEYS }}
          TAVILY_API_KEYS: ${{ secrets.TAVILY_API_KEYS }}
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          
          # Discord配置变更（v3.x 向后兼容）
          DISCORD_MAIN_CHANNEL_ID: ${{ vars.DISCORD_MAIN_CHANNEL_ID || secrets.DISCORD_MAIN_CHANNEL_ID || secrets.DISCORD_CHANNEL_ID || '' }}
          DISCORD_MAX_WORDS: ${{ vars.DISCORD_MAX_WORDS || secrets.DISCORD_MAX_WORDS || '1500' }}
          STOCK_LIST: ${{ secrets.STOCK_LIST_HK }}
          # 港股特定配置
          MARKET_REVIEW_ENABLED: 'false'
          MARKET_REVIEW_REGION: 'cn'
          HK_MARKET_ENABLED: 'true'  # 明确启用港股市场支持
          # 数据源优化
          REPORT_TYPE: ${{ vars.REPORT_TYPE || secrets.REPORT_TYPE || 'simple' }}
          SINGLE_STOCK_NOTIFY: ${{ vars.SINGLE_STOCK_NOTIFY || secrets.SINGLE_STOCK_NOTIFY || 'false' }}
          # 新功能配置（v3.0+）
          AGENT_ARCH: ${{ vars.AGENT_ARCH || secrets.AGENT_ARCH || 'multi' }}
          AGENT_NL_ROUTING: ${{ vars.AGENT_NL_ROUTING || secrets.AGENT_NL_ROUTING || 'true' }}
          AGENT_MODE: ${{ vars.AGENT_MODE || secrets.AGENT_MODE || 'true' }}
          AGENT_MAX_STEPS: ${{ vars.AGENT_MAX_STEPS || secrets.AGENT_MAX_STEPS || '10' }}
          AGENT_SKILLS: ${{ vars.AGENT_SKILLS || secrets.AGENT_SKILLS || 'bull_trend,ma_golden_cross,volume_breakout,shrink_pullback' }}
          AGENT_ORCHESTRATOR_MODE: ${{ vars.AGENT_ORCHESTRATOR_MODE || secrets.AGENT_ORCHESTRATOR_MODE || 'standard' }}
          AGENT_RISK_OVERRIDE: ${{ vars.AGENT_RISK_OVERRIDE || secrets.AGENT_RISK_OVERRIDE || 'true' }}
          AGENT_STRATEGY_AUTOWEIGHT: ${{ vars.AGENT_STRATEGY_AUTOWEIGHT || secrets.AGENT_STRATEGY_AUTOWEIGHT || 'true' }}
          
          WEBHOOK_VERIFY_SSL: ${{ vars.WEBHOOK_VERIFY_SSL || secrets.WEBHOOK_VERIFY_SSL || 'true' }}
          RUN_IMMEDIATELY: ${{ vars.RUN_IMMEDIATELY || secrets.RUN_IMMEDIATELY || 'false' }}
          REPORT_SUMMARY_ONLY: ${{ vars.REPORT_SUMMARY_ONLY || secrets.REPORT_SUMMARY_ONLY || 'false' }}
          MERGE_EMAIL_NOTIFICATION: ${{ vars.MERGE_EMAIL_NOTIFICATION || secrets.MERGE_EMAIL_NOTIFICATION || 'false' }}
          
          # Portfolio持仓管理（v3.7.0全新功能）
          PORTFOLIO_RISK_CONCENTRATION_ALERT_PCT: ${{ vars.PORTFOLIO_RISK_CONCENTRATION_ALERT_PCT || secrets.PORTFOLIO_RISK_CONCENTRATION_ALERT_PCT || '35.0' }}
          PORTFOLIO_RISK_DRAWDOWN_ALERT_PCT: ${{ vars.PORTFOLIO_RISK_DRAWDOWN_ALERT_PCT || secrets.PORTFOLIO_RISK_DRAWDOWN_ALERT_PCT || '15.0' }}
          PORTFOLIO_RISK_STOP_LOSS_ALERT_PCT: ${{ vars.PORTFOLIO_RISK_STOP_LOSS_ALERT_PCT || secrets.PORTFOLIO_RISK_STOP_LOSS_ALERT_PCT || '10.0' }}
          PORTFOLIO_RISK_STOP_LOSS_NEAR_RATIO: ${{ vars.PORTFOLIO_RISK_STOP_LOSS_NEAR_RATIO || secrets.PORTFOLIO_RISK_STOP_LOSS_NEAR_RATIO || '0.8' }}
          PORTFOLIO_RISK_LOOKBACK_DAYS: ${{ vars.PORTFOLIO_RISK_LOOKBACK_DAYS || secrets.PORTFOLIO_RISK_LOOKBACK_DAYS || '180' }}
          PORTFOLIO_FX_UPDATE_ENABLED: ${{ vars.PORTFOLIO_FX_UPDATE_ENABLED || secrets.PORTFOLIO_FX_UPDATE_ENABLED || 'true' }}
          
          # Web界面（可选启用）
          WEBUI_ENABLED: ${{ vars.WEBUI_ENABLED || secrets.WEBUI_ENABLED || 'false' }}
          WEBUI_HOST: ${{ vars.WEBUI_HOST || secrets.WEBUI_HOST || '127.0.0.1' }}
          WEBUI_PORT: ${{ vars.WEBUI_PORT || secrets.WEBUI_PORT || '8000' }}
          ADMIN_AUTH_ENABLED: ${{ vars.ADMIN_AUTH_ENABLED || secrets.ADMIN_AUTH_ENABLED || 'false' }}
          
          # 高级分析功能
          ENABLE_REALTIME_TECHNICAL_INDICATORS: ${{ vars.ENABLE_REALTIME_TECHNICAL_INDICATORS || secrets.ENABLE_REALTIME_TECHNICAL_INDICATORS || 'true' }}
          FUNDAMENTAL_CONTEXT_ENABLED: ${{ vars.FUNDAMENTAL_CONTEXT_ENABLED || secrets.FUNDAMENTAL_CONTEXT_ENABLED || 'true' }}
          CHIPS_DISTRIBUTION_ENABLED: ${{ vars.CHIPS_DISTRIBUTION_ENABLED || secrets.CHIPS_DISTRIBUTION_ENABLED || 'true' }}
          
          # 数据源和稳定性配置
          TRADING_DAY_CHECK_ENABLED: ${{ vars.TRADING_DAY_CHECK_ENABLED || secrets.TRADING_DAY_CHECK_ENABLED || 'true' }}
          LOG_LEVEL: DEBUG  # 改为DEBUG以查看更多详细信息
          MAX_WORKERS: '1'
          REALTIME_SOURCE_PRIORITY: 'yfinance,akshare'  # 优先yfinance，备选akshare
          YFINANCE_PRIORITY: '0'  # 确保yfinance优先
          
          # 超时配置（efinance修复 v3.6.0）
          EFINANCE_TIMEOUT: '30'  # 添加efinance API超时设置

        run: |
          FORCE_RUN_ARG=""
          if [ "${{ github.event.inputs.force_run }}" = "true" ]; then
            FORCE_RUN_ARG="--force-run"
          fi

          MODE="${{ github.event.inputs.mode || 'stocks-only' }}"

          echo "=========================================="
          echo "🚀 港股自选股智能分析系统（v3.7.0兼容）"
          echo "=========================================="
          echo "⏰ 时间: $(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S')"
          echo "🎯 运行模式: $MODE"
          echo "📊 自选股: $STOCK_LIST"
          echo ""
          
          # 配置验证和兼容性处理
          echo "🔧 配置验证和兼容性处理..."
          
          # 1. 清空TUSHARE_TOKEN，避免港股数据获取失败
          unset TUSHARE_TOKEN
          echo "✅ TUSHARE_TOKEN已清空，优先使用yfinance获取港股数据"
          
          # 2. 检查LiteLLM配置格式（v3.4.0破坏性变更）
          echo "📡 数据源优先级: $REALTIME_SOURCE_PRIORITY"
          echo "🔧 YFINANCE_PRIORITY: $YFINANCE_PRIORITY"
          echo "🤖 Agent架构: $AGENT_ARCH (Agent模式: $AGENT_MODE)"
          echo "🌐 LiteLLM模型: $LITELLM_MODEL"
          echo "💼 Portfolio风险监控: $PORTFOLIO_RISK_CONCENTRATION_ALERT_PCT% 集中度警报"
          echo "🛡️  风控Agent否决权: $AGENT_RISK_OVERRIDE"
          
          # 3. 测试关键依赖可用性
          echo "🧪 测试关键依赖可用性..."
          python -c "
import sys
print('🚀 v3.7.0 新功能配置验证')
print('='*50)

# 测试LiteLLM集成（v3.4.0）
try:
    import litellm
    print('✅ LiteLLM可用 (v3.4.0集成)')
except Exception as e:
    print(f'❌ LiteLLM导入失败: {e}')
    sys.exit(1)
    
# 测试数据源
try:
    import yfinance as yf
    print('✅ yfinance可用')
except Exception as e:
    print(f'❌ yfinance导入失败: {e}')
try:
    import akshare as ak
    print('✅ akshare可用')
except Exception as e:
    print(f'❌ akshare导入失败: {e}')

# 测试新功能依赖
try:
    import sqlalchemy
    print('✅ SQLAlchemy可用 (Portfolio数据库支持)')
except Exception as e:
    print(f'❌ SQLAlchemy导入失败: {e}')

try:
    import fastapi
    print('✅ FastAPI可用 (Web界面支持)')
except Exception as e:
    print(f'❌ FastAPI导入失败: {e}')

# 检查Gemini模型格式（破坏性变更修复）
if '$LITELLM_MODEL'.startswith('gemini/gemini-'):
    print('✅ Gemini模型格式正确 (LiteLLM兼容格式)')
else:
    print('⚠️  Gemini模型格式可能需要调整')

# 新功能状态报告
print('')
print('📊 新功能配置状态:')
print(f'  Agent架构: $AGENT_ARCH (Multi-Agent协同)')
print(f'  Agent技能: $AGENT_SKILLS')
print(f'  Agent路由: $AGENT_NL_ROUTING')
print(f'  Portfolio风险监控: 启用')
print(f'    集中度警报: $PORTFOLIO_RISK_CONCENTRATION_ALERT_PCT%')
print(f'    回撤警报: $PORTFOLIO_RISK_DRAWDOWN_ALERT_PCT%')
print(f'  Web界面: $WEBUI_ENABLED')
print(f'  实时技术指标: $ENABLE_REALTIME_TECHNICAL_INDICATORS')
print(f'  基本面聚合: $FUNDAMENTAL_CONTEXT_ENABLED')

print('')
print('✅ v3.7.0 所有新功能配置验证完成！')"

          if [ "$MODE" = "market-only" ]; then
            python main.py --market-review $FORCE_RUN_ARG
          elif [ "$MODE" = "stocks-only" ]; then
            python main.py --no-market-review $FORCE_RUN_ARG
          else
            python main.py $FORCE_RUN_ARG
          fi

      - name: 上传分析报告
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: hk-analysis-reports-${{ github.run_number }}
          path: |
            reports/
            logs/
          retention-days: 30

      - name: 显示运行结果
        if: always()
        run: |
          echo "=========================================="
          echo "📊 港股分析完成"
          echo "=========================================="
          if [ -d "reports" ] && [ "$(ls -A reports 2>/dev/null)" ]; then
            ls -la reports/
          fi
          tail -30 logs/stock_analysis_*.log 2>/dev/null || echo "无日志"
